backend:
  name: github
  repo: eesjcpi/blog
  branch: main
  base_url: https://ee-sao-jose-blog-auth.rodrigoraa254.workers.dev
  auth_endpoint: auth
  commit_messages:
    create: 'Criar {{collection}} "{{slug}}"'
    update: 'Atualizar {{collection}} "{{slug}}"'
    delete: 'Excluir {{collection}} "{{slug}}"'
    uploadMedia: 'Enviar imagem "{{path}}"'
    deleteMedia: 'Excluir imagem "{{path}}"'

locale: pt
site_url: https://blog.eesjv.com.br/
display_url: https://blog.eesjv.com.br/
logo_url: https://blog.eesjv.com.br/assets/img/logo_escola.png

media_folder: assets/uploads
public_folder: /assets/uploads

publish_mode: simple

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: postagens
    label: Postagens
    label_singular: Postagem
    description: Avisos, projetos, galeria, Instagram e vestibular. Para viagens, use a coleção "Viagens".
    folder: content/postagens
    create: true
    delete: true
    extension: json
    format: json
    identifier_field: titulo
    summary: "{{categoria}} — {{titulo}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo, categoria]
    fields:
      - label: Título
        name: titulo
        widget: string

      - label: Categoria
        name: categoria
        widget: select
        options:
          - { label: "Avisos", value: "avisos" }
          - { label: "Projetos", value: "projetos" }
          - { label: "Galeria", value: "galeria" }
          - { label: "Instagram", value: "instagram" }
          - { label: "Vestibular", value: "vestibular" }

      - label: Data
        name: data
        widget: datetime
        date_format: "DD/MM/YYYY"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: Resumo
        name: resumo
        widget: text
        hint: Texto curto exibido no card da página inicial.

      - label: Conteúdo completo
        name: body
        widget: markdown
        required: false

      - label: Imagem
        name: imagem
        widget: image
        required: false
        hint: Para Instagram, esta será a capa do card. Se não escolher, o site tentará obter automaticamente a capa da publicação.

      - label: Link da publicação no Instagram
        name: instagram_url
        widget: string
        required: false
        pattern:
          - "^https://(www\\.)?instagram\\.com/(p|reel|tv)/.+"
          - "Informe um link válido de publicação ou reel do Instagram."
        hint: Obrigatório para a categoria Instagram. Também pode ser usado em Projetos.

      - label: Link externo
        name: link_externo
        widget: string
        required: false
        hint: Útil para vestibulares, formulários e páginas externas.

      - label: Publicado
        name: publicado
        widget: boolean
        default: true

      - label: Destaque
        name: destaque
        widget: boolean
        default: false
        required: false

  - name: viagens
    label: Viagens
    label_singular: Álbum de viagem
    description: Crie uma viagem, salve e adicione quantas fotos desejar. Também é possível publicar o álbum sem fotos e completá-lo depois.
    folder: content/viagens
    create: true
    delete: true
    extension: json
    format: json
    identifier_field: titulo
    summary: "{{data}} — {{titulo}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo, destino]
    fields:
      - label: Nome da viagem
        name: titulo
        widget: string
        hint: "Exemplo: Viagem do Conhecimento ao Bioparque Pantanal"

      - label: Data
        name: data
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true
        default: "{{now}}"

      - label: Destino
        name: destino
        widget: string
        hint: Cidade, instituição ou local visitado.

      - label: Descrição
        name: resumo
        widget: text
        hint: Breve relato sobre a viagem e seus objetivos pedagógicos.

      - label: Foto de capa
        name: capa
        widget: image
        required: false
        hint: Se não escolher, a primeira foto do álbum será usada como capa.

      - label: Fotos do álbum
        name: fotos
        widget: list
        label_singular: Foto
        summary: "{{fields.legenda}}"
        required: false
        allow_add: true
        allow_remove: true
        allow_reorder: true
        collapsed: false
        hint: Você pode salvar a viagem sem fotos e adicioná-las posteriormente.
        fields:
          - label: Imagem
            name: imagem
            widget: image
          - label: Legenda
            name: legenda
            widget: string
            required: false

      - label: Publicado
        name: publicado
        widget: boolean
        default: true
        hint: Desmarque para manter a viagem cadastrada sem exibi-la no site.
