backend:
  name: github
  repo: eesjcpi/blog
  branch: main
  base_url: https://ee-sao-jose-blog-auth.rodrigoraa254.workers.dev
  auth_endpoint: auth
  commit_messages:
    create: 'Criar {{collection}} "{{slug}}"'
    update: 'Atualizar {{collection}} "{{slug}}"'
    delete: 'Excluir {{collection}} "{{slug}}"'
    uploadMedia: 'Enviar imagem "{{path}}"'
    deleteMedia: 'Excluir imagem "{{path}}"'

locale: pt
site_url: https://blog.eesjv.com.br/
display_url: https://blog.eesjv.com.br/
logo_url: https://blog.eesjv.com.br/assets/img/logo_escola.png

media_folder: assets/uploads
public_folder: /assets/uploads

publish_mode: simple

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: projetos
    label: Projetos
    label_singular: Projeto
    description: Ações pedagógicas, culturais, esportivas e ambientais da escola.
    folder: content/postagens
    create: true
    delete: true
    extension: json
    format: json
    filter: { field: categoria, value: projetos }
    identifier_field: titulo
    summary: "{{data}} — {{titulo}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo]
    fields:
      - label: Título
        name: titulo
        widget: string

      - label: Categoria
        name: categoria
        widget: hidden
        default: projetos

      - label: Data
        name: data
        widget: datetime
        date_format: "DD/MM/YYYY"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:ssZ"
        default: "{{now}}"

      - label: Descrição curta
        name: resumo
        widget: text
        hint: Texto que aparecerá junto ao projeto na página inicial.

      - label: Imagem de capa
        name: imagem
        widget: image
        hint: Imagem principal do projeto.

      - label: Texto adicional
        name: body
        widget: text
        required: false
        hint: Opcional. Use somente se quiser acrescentar um texto maior na página do projeto.

      - label: Exibir no site
        name: publicado
        widget: boolean
        default: true

  - name: galeria
    label: Galeria
    label_singular: Foto da galeria
    description: Fotos em destaque da escola e da comunidade escolar.
    folder: content/postagens
    create: true
    delete: true
    extension: json
    format: json
    filter: { field: categoria, value: galeria }
    identifier_field: titulo
    summary: "{{data}} — {{titulo}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo]
    fields:
      - { label: Título, name: titulo, widget: string }
      - { label: Categoria, name: categoria, widget: hidden, default: galeria }
      - label: Data
        name: data
        widget: datetime
        date_format: "DD/MM/YYYY"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:ssZ"
        default: "{{now}}"
      - label: Imagem
        name: imagem
        widget: image
      - label: Legenda
        name: resumo
        widget: text
        required: false
        hint: Opcional. Pequena descrição da foto.
      - { label: Exibir no site, name: publicado, widget: boolean, default: true }

  - name: instagram
    label: Instagram
    label_singular: Publicação do Instagram
    description: Publicações e reels do perfil oficial da escola.
    folder: content/postagens
    create: true
    delete: true
    extension: json
    format: json
    filter: { field: categoria, value: instagram }
    identifier_field: titulo
    summary: "{{data}} — {{titulo}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo]
    fields:
      - { label: Título, name: titulo, widget: string }
      - { label: Categoria, name: categoria, widget: hidden, default: instagram }
      - label: Data
        name: data
        widget: datetime
        date_format: "DD/MM/YYYY"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:ssZ"
        default: "{{now}}"
      - label: Descrição
        name: resumo
        widget: text
        hint: Texto que aparecerá abaixo da imagem.
      - label: Link da publicação
        name: instagram_url
        widget: string
        pattern:
          - "^https://(www\\.)?instagram\\.com/(p|reel|tv)/.+"
          - "Informe um link válido de publicação ou reel do Instagram."
        hint: Cole aqui o link da publicação. A imagem será obtida automaticamente.
      - { label: Exibir no site, name: publicado, widget: boolean, default: true }

  - name: vestibular
    label: Vestibular
    label_singular: Link de vestibular
    description: Inscrições, processos seletivos e oportunidades para estudantes.
    folder: content/postagens
    create: true
    delete: true
    extension: json
    format: json
    filter: { field: categoria, value: vestibular }
    identifier_field: titulo
    summary: "{{data}} — {{titulo}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo]
    fields:
      - { label: Título, name: titulo, widget: string }
      - { label: Categoria, name: categoria, widget: hidden, default: vestibular }
      - label: Data
        name: data
        widget: datetime
        date_format: "DD/MM/YYYY"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:ssZ"
        default: "{{now}}"
      - label: Descrição curta
        name: resumo
        widget: text
      - label: Link para inscrição ou informações
        name: link_externo
        widget: string
        pattern:
          - "^https?://.+"
          - "Informe um link completo começando com http:// ou https://."
      - { label: Exibir no site, name: publicado, widget: boolean, default: true }

  - name: viagens
    label: Viagens
    label_singular: Álbum de viagem
    description: Crie uma viagem, salve e adicione quantas fotos desejar. Também é possível publicar o álbum sem fotos e completá-lo depois.
    folder: content/viagens
    create: true
    delete: true
    extension: json
    format: json
    identifier_field: titulo
    summary: "{{data}} — {{titulo}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo, destino]
    fields:
      - label: Nome da viagem
        name: titulo
        widget: string
        hint: "Exemplo: Viagem do Conhecimento ao Bioparque Pantanal"

      - label: Data
        name: data
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true
        default: "{{now}}"

      - label: Destino
        name: destino
        widget: string
        hint: Cidade, instituição ou local visitado.

      - label: Descrição
        name: resumo
        widget: text
        hint: Breve relato sobre a viagem e seus objetivos pedagógicos.

      - label: Foto de capa
        name: capa
        widget: image
        required: false
        hint: Se não escolher, a primeira foto do álbum será usada como capa.

      - label: Fotos do álbum
        name: fotos
        widget: list
        label_singular: Foto
        summary: "{{fields.legenda}}"
        required: false
        allow_add: true
        allow_remove: true
        allow_reorder: true
        collapsed: false
        hint: Você pode salvar a viagem sem fotos e adicioná-las posteriormente.
        fields:
          - label: Imagem
            name: imagem
            widget: image
          - label: Legenda
            name: legenda
            widget: string
            required: false

      - label: Publicado
        name: publicado
        widget: boolean
        default: true
        hint: Desmarque para manter a viagem cadastrada sem exibi-la no site.
